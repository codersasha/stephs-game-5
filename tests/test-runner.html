<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warrior Cats 3D RP — tests</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; background: #111; color: #eee; }
    .pass { color: #6c6; }
    .fail { color: #f66; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Game logic tests</h1>
  <pre id="out"></pre>
  <script src="../js/game-logic.js"></script>
  <script>
    (function () {
      const out = document.getElementById('out');
      let passed = 0, failed = 0;
      const lines = [];

      function ok (name, cond) {
        if (cond) {
          passed++;
          lines.push('<span class="pass">PASS</span> ' + name);
        } else {
          failed++;
          lines.push('<span class="fail">FAIL</span> ' + name);
        }
      }

      ok('validateNamePrefix good', GameLogic.validateNamePrefix('Blue'));
      ok('validateNamePrefix short', !GameLogic.validateNamePrefix('A'));
      ok('validateNamePrefix bad chars', !GameLogic.validateNamePrefix('Blue2'));

      ok('formatNamePrefix', GameLogic.formatNamePrefix('fire') === 'Fire');

      const p = GameLogic.createDefaultProfile();
      ok('getWarriorName warrior default suffix', GameLogic.getWarriorName({ ...p, namePrefix: 'Fire', rank: 'warrior', nameSuffix: 'heart' }) === 'Fireheart');
      ok('getWarriorName warrior custom', GameLogic.getWarriorName({ ...p, namePrefix: 'Sand', rank: 'warrior', nameSuffix: 'storm' }) === 'Sandstorm');
      ok('getWarriorName deputy', GameLogic.getWarriorName({ ...p, namePrefix: 'Gray', rank: 'deputy', nameSuffix: 'stripe' }) === 'Graystripe');
      ok('getWarriorName elder', GameLogic.getWarriorName({ ...p, namePrefix: 'Hal', rank: 'elder', nameSuffix: 'tail' }) === 'Haltail');
      ok('getWarriorName kit', GameLogic.getWarriorName({ ...p, namePrefix: 'Sand', rank: 'kit' }) === 'Sandkit');
      ok('getWarriorName apprentice', GameLogic.getWarriorName({ ...p, namePrefix: 'Sand', rank: 'apprentice' }) === 'Sandpaw');
      ok('getWarriorName leader', GameLogic.getWarriorName({ ...p, namePrefix: 'Blue', rank: 'leader' }) === 'Bluestar');
      ok('getWarriorName kittypet', GameLogic.getWarriorName({ ...p, namePrefix: 'Rusty', rank: 'kittypet' }) === 'Rusty');
      ok('getWarriorName rogue suffix', GameLogic.getWarriorName({ ...p, namePrefix: 'Dark', rank: 'rogue', nameSuffix: 'claw' }) === 'Darkclaw');
      ok('getWarriorName medicine cat', GameLogic.getWarriorName({ ...p, namePrefix: 'Leaf', rank: 'medicine cat', nameSuffix: 'shine' }) === 'Leafshine');
      ok('getWarriorName queen', GameLogic.getWarriorName({ ...p, namePrefix: 'Sorrel', rank: 'queen', nameSuffix: 'tail' }) === 'Sorreltail');
      ok('usesWarriorSuffix medicine+queen', GameLogic.usesWarriorSuffixRank('medicine cat') && GameLogic.usesWarriorSuffixRank('queen'));
      ok('getRoleLabel loner', GameLogic.getRoleLabel({ ...p, clan: 'Outside the clans', rank: 'loner' }) === 'Loner');
      ok('getRoleLabel medicine cat', GameLogic.getRoleLabel({ ...p, clan: 'RiverClan', rank: 'medicine cat' }) === 'RiverClan — Medicine cat');

      ok('clampHexColor', GameLogic.clampHexColor('#ff00aa') === '#ff00aa');
      ok('clampHexColor bad', GameLogic.clampHexColor('nope') === '#c9753d');

      lines.push('');
      lines.push('Done: ' + passed + ' passed, ' + failed + ' failed.');
      out.innerHTML = lines.join('\n');
    })();
  </script>
</body>
</html>
